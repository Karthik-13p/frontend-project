
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>

    <div class="logo">
        <h1>ShopEasy</h1>
    </div>

</header>

<section class="checkout-page">

    <div class="checkout-container">

        <h2>Checkout</h2>

        <form>

            <input type="text"
            placeholder="Full Name"
            required>

            <input type="email"
            placeholder="Email Address"
            required>

            <input type="text"
            placeholder="Phone Number"
            required>

            <textarea
            rows="5"
            placeholder="Shipping Address"
            required>
            </textarea>

            <select required>

                <option>
                    Select Payment Method
                </option>

                <option>
                    Cash On Delivery
                </option>

                <option>
                    UPI Payment
                </option>

                <option>
                    Credit / Debit Card
                </option>

            </select>

          
<a href="confirm.html" class="place-order-btn">
    Place Order
</a>



        </form>

    </div>

</section>

</body>
</html>
